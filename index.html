<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Teto Mansion 3D: Brillo Máximo</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; text-shadow: 2px 2px #000; z-index: 10; }
        #stamina-bar { width: 200px; height: 15px; background: rgba(0,0,0,0.5); border: 2px solid white; border-radius: 10px; overflow: hidden; }
        #stamina-fill { width: 100%; height: 100%; background: #00ffcc; }
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; pointer-events: none; z-index: 10; }
        .btn-zone { width: 80px; height: 80px; background: rgba(255,255,255,0.3); border-radius: 50%; pointer-events: auto; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; border: 3px solid white; user-select: none; }
        #joystick-area { width: 120px; height: 120px; background: rgba(255,255,255,0.2); border-radius: 50%; border: 3px solid #ff66b2; pointer-events: auto; }
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 20px; text-align: center; border: 5px solid #ff66b2; z-index: 100; }
    </style>
</head>
<body>

<div id="ui">
    <h1>🥖 Baguettes: <span id="score">0</span> / 10</h1>
    <div id="stamina-bar"><div id="stamina-fill"></div></div>
    <b>STAMINA</b>
</div>

<div id="menu">
    <h1 style="color:#ff66b2">TETO MANSION 3D</h1>
    <p>¡Busca las baguettes en las habitaciones!</p>
    <button style="padding:15px; background:#ff66b2; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;" onclick="start()">¡JUGAR AHORA!</button>
</div>

<div class="controls" id="game-controls" style="display:none">
    <div id="joystick-area"></div>
    <div style="display:flex; gap: 20px;">
        <div class="btn-zone" id="btn-run">CORRER</div>
        <div class="btn-zone" id="btn-jump">SALTAR</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let scene, camera, renderer, player, clock;
    let baguettes = [];
    let score = 0, stamina = 100, isRunning = false, yVelocity = 0;
    let moveDir = { x: 0, z: 0 };

    function start() {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game-controls').style.display = 'flex';
        init();
    }

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Cielo azul claro
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        clock = new THREE.Clock();

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // LUCES MUCHO MÁS FUERTES
        const ambientLight = new THREE.AmbientLight(0xffffff, 1); 
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 1);
        sunLight.position.set(5, 10, 5);
        scene.add(sunLight);

        // Suelo de madera brillante
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100),
            new THREE.MeshPhongMaterial({ color: 0x8B4513 })
        );
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // Paredes de la mansión (Color claro para que se vea)
        function wall(w, h, d, x, z) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshPhongMaterial({color: 0xffffff}));
            m.position.set(x, h/2, z);
            scene.add(m);
        }
        wall(100, 10, 1, 0, -50); wall(100, 10, 1, 0, 50); // Exteriores
        wall(1, 10, 100, -50, 0); wall(1, 10, 100, 50, 0);
        wall(30, 10, 1, -20, 10); wall(1, 10, 30, 10, -20); // Habitaciones

        // Jugador (Teto Rosa)
        player = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshPhongMaterial({color: 0xff66b2}));
        body.position.y = 1;
