<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Teto Mansion 3D: Baguette Hunt</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; }
        #stamina-bar { width: 200px; height: 15px; background: rgba(0,0,0,0.5); border: 2px solid white; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        #stamina-fill { width: 100%; height: 100%; background: #00ffcc; transition: width 0.1s; }
        
        /* Controles para Tablet */
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; pointer-events: none; }
        .btn-zone { width: 80px; height: 80px; background: rgba(255,255,255,0.2); border-radius: 50%; pointer-events: auto; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; border: 2px solid white; user-select: none; }
        #joystick { width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; position: relative; border: 2px solid #ff66b2; }
        
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 20px; text-align: center; border: 5px solid #ff66b2; z-index: 100; }
        .skin-btn { padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 10px; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui">
    <h1 style="margin:0">🥖 Baguettes: <span id="score">0</span> / 10</h1>
    <div id="stamina-bar"><div id="stamina-fill"></div></div>
    <small>STAMINA (CORRER)</small>
</div>

<div id="menu">
    <h1 style="color:#ff66b2">TETO MANSION 3D</h1>
    <p>¡Encuentra las 10 baguettes escondidas!</p>
    <button class="skin-btn" style="background:#ff66b2; color:white" onclick="start('Teto', 0xff66b2)">Teto</button>
    <button class="skin-btn" style="background:#33ffcc" onclick="start('Miku', 0x33ffcc)">Miku</button>
    <button class="skin-btn" style="background:#ffff00" onclick="start('Rin', 0xffff00)">Rin</button>
    <button class="skin-btn" style="background:#3366ff; color:white" onclick="start('Kaito', 0x3366ff)">Kaito</button>
</div>

<div class="controls" id="game-controls" style="display:none">
    <div id="joystick" onclick="">Mover</div>
    <div style="display:flex; gap: 20px;">
        <div class="btn-zone" id="btn-run">CORRER</div>
        <div class="btn-zone" id="btn-jump">SALTAR</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let scene, camera, renderer, player, clock;
    let baguettes = [], walls = [];
    let score = 0, stamina = 100, isRunning = false, isJumping = false, yVelocity = 0;
    let moveDir = { x: 0, z: 0 };

    function start(name, color) {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game-controls').style.display = 'flex';
        init(color);
    }

    function createWall(w, h, d, x, z, color = 0xeeeeee) {
        const geo = new THREE.BoxGeometry(w, h, d);
        const mat = new THREE.MeshPhongMaterial({ color: color });
        const wall = new THREE.Mesh(geo, mat);
        wall.position.set(x, h/2, z);
        scene.add(wall);
        walls.push(wall);
    }

    function init(playerColor) {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122); 
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        clock = new THREE.Clock();

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0x404040, 2));
        const light = new THREE.PointLight(0xffffff, 1, 100);
        light.position.set(0, 10, 0);
        scene.add(light);

        // Suelo de la mansión
        const floorGeo = new THREE.PlaneGeometry(60, 60);
        const floorMat = new THREE.MeshPhongMaterial({ color: 0x442211 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // --- CONSTRUCCIÓN DE LA CASA GRANDE ---
        createWall(60, 5, 1, 0, -30); // Pared fondo
        createWall(60, 5, 1, 0, 30);  // Pared frente
        createWall(1, 5, 60, -30, 0); // Pared izq
        createWall(1, 5, 60, 30, 0);  // Pared der
        
        // Habitaciones (Escondites)
        createWall(20, 5, 1, -20, 0);   // Cuarto 1
        createWall(1, 5, 20, 0, -20);   // Cuarto 2
        createWall(15, 8, 15, 15, 15, 0x553311); // Un mueble grande/plataforma

        // Jugador
        player = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.4, 0.5), new THREE.MeshPhongMaterial({ color: playerColor }));
        body.position.y = 0.7;
        player.add(body);
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshPhongMaterial({ color: playerColor }));
        head.position.y = 1.6;
        player.add(head);
        scene.add(player);

        // Bots (Baguettes) escondidos
        for(let i=0; i<10; i++) {
            const bag = new THREE.Mesh(new THREE.CapsuleGeometry(0.15, 0.5, 4, 8), new THREE.MeshPhongMaterial({ color: 0xd2b48c }));
            bag.position.set((Math.random()-0.5)*50, 0.4, (Math.random()-0.5)*50);
            scene.add(bag);
            baguettes.push(bag);
        }

        // Eventos de controles
        const btnRun = document.getElementById('btn-run');
        const btnJump = document.getElementById('btn-jump');
        const joystick = document.getElementById('joystick');

        btnRun.ontouchstart = () => { if(stamina > 10) isRunning = true; };
        btnRun.ontouchend = () => isRunning = false;
        btnJump.ontouchstart = () => { if(!isJumping) { yVelocity = 0.2; isJumping = true; } };

        joystick.ontouchmove = (e) => {
            const touch = e.touches[0];
            const rect = joystick.getBoundingClientRect();
            moveDir.x = (touch.clientX - (rect.left + rect.width/2)) / 50;
            moveDir.z = (touch.clientY - (rect.top + rect.height/2)) / 50;
        };
        joystick.ontouchend = () => { moveDir.x = 0; moveDir.z = 0; };

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();

        // Lógica de Movimiento y Stamina
        let speed = isRunning && stamina > 0 ? 0.25 : 0.12;
        if (isRunning && stamina > 0) {
            stamina -= 0.5;
            if(stamina <= 0) isRunning = false;
        } else if (stamina < 100) {
            stamina += 0.2;
        }
        document.getElementById('stamina-fill').style.width = stamina + "%";

        player.position.x += moveDir.x * speed;
        player.position.z += moveDir.z * speed;

        // Gravedad y Salto
        player.position.y += yVelocity;
        if (player.position.y > 0) {
            yVelocity -= 0.01;
        } else {
            player.position.y = 0;
            yVelocity = 0;
            isJumping = false;
        }

        // Cámara sigue al jugador
        camera.position.set(player.position.x, player.position.y + 6, player.position.z + 12);
        camera.lookAt(player.position);

        // Recoger Baguettes
        baguettes.forEach((b, i) => {
            b.rotation.y += 0.05;
            if(player.position.distanceTo(b.position) < 1.5) {
                scene.remove(b);
                baguettes.splice(i, 1);
                score++;
                document.getElementById('score').innerText = score;
                if(score >= 10) alert("¡GANASTE! Encontraste todas las baguettes.");
            }
        });

        renderer.render(scene, camera);
    }
</script>
</body>
</html>
